{{- $action := .Site.Params.contactFormEndpoint -}}
{{- $email := .Site.Params.contact.email -}}
{{- $subjects := (hugo.Data.contactForm | default dict).subjects -}}
{{- if not $action -}}
<div class="form-disabled-note" role="status">
  <p>{{ i18n "contact_form_unavailable" }}
  {{ with $email }}<a href="mailto:{{ . }}">{{ . }}</a>{{ end }}</p>
</div>
{{- else -}}
<form class="contact-form" action="{{ $action }}" method="POST">
  <div class="form-row">
    <div class="form-group">
      <label for="name">{{ i18n "form_name" }} *</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="email">{{ i18n "form_email" }} *</label>
      <input type="email" id="email" name="email" required>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="phone">{{ i18n "form_phone" }}</label>
      <input type="tel" id="phone" name="phone">
    </div>
    <div class="form-group">
      <label for="subject">{{ i18n "form_subject" }} *</label>
      <select id="subject" name="subject" required>
        <option value="">{{ i18n "form_subject_choose" }}</option>
        {{ range $subjects }}
        {{ $label := .label }}
        {{ if not $label }}{{ $label = i18n .i18nKey }}{{ end }}
        {{ if not $label }}{{ $label = .value }}{{ end }}
        <option value="{{ .value }}">{{ $label }}</option>
        {{ end }}
      </select>
    </div>
  </div>
  <div class="form-group">
    <label for="message">{{ i18n "form_message" }} *</label>
    <textarea id="message" name="message" rows="6" required></textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-lg">{{ i18n "form_submit_contact" }}</button>
</form>
{{- end -}}
