<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" role="img" aria-label="qaduni-theme screenshot">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f4c81"/>
      <stop offset="1" stop-color="#0a3459"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="1000" fill="#f8fafc"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1500" height="36" fill="#0a3459"/>
  <text x="40" y="24" fill="#fff" font-family="system-ui" font-size="13" opacity="0.85">University parent site</text>
  <text x="1320" y="24" fill="#fff" font-family="system-ui" font-size="13" opacity="0.85">contact@example.edu</text>
  <!-- Header -->
  <rect x="0" y="36" width="1500" height="92" fill="#fff" stroke="#e2e8f0"/>
  <circle cx="80" cy="82" r="22" fill="#0f4c81"/>
  <text x="116" y="79" fill="#0f4c81" font-family="system-ui" font-size="18" font-weight="700">Department Name</text>
  <text x="116" y="98" fill="#6b6b8d" font-family="system-ui" font-size="12">Parent University</text>
  <g font-family="system-ui" font-size="14" fill="#1a1a2e">
    <text x="540" y="86">Home</text>
    <text x="610" y="86">About</text>
    <text x="690" y="86">Programs</text>
    <text x="800" y="86">Research</text>
    <text x="900" y="86">News</text>
    <text x="970" y="86">Contact</text>
  </g>
  <rect x="1340" y="62" width="120" height="40" rx="20" fill="#f8fafc"/>
  <text x="1380" y="86" fill="#0f4c81" font-family="system-ui" font-size="13" font-weight="500">EN | AR</text>
  <!-- Hero -->
  <rect x="0" y="128" width="1500" height="500" fill="url(#hero)"/>
  <rect x="100" y="240" width="220" height="36" rx="18" fill="rgba(255,215,0,0.2)" stroke="#ffd700"/>
  <text x="130" y="263" fill="#fff" font-family="system-ui" font-size="14">Internationally Accredited</text>
  <text x="100" y="340" fill="#fff" font-family="system-ui" font-size="58" font-weight="700">Welcome to our Department</text>
  <text x="100" y="400" fill="#fff" font-family="system-ui" font-size="20" opacity="0.9">A general-purpose Hugo theme for universities,</text>
  <text x="100" y="430" fill="#fff" font-family="system-ui" font-size="20" opacity="0.9">departments and academic organisations.</text>
  <rect x="100" y="475" width="200" height="58" rx="12" fill="#ffd700"/>
  <text x="200" y="513" text-anchor="middle" fill="#0a3459" font-family="system-ui" font-size="17" font-weight="700">Explore About</text>
  <rect x="320" y="475" width="180" height="58" rx="12" fill="transparent" stroke="#fff" stroke-width="2"/>
  <text x="410" y="513" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="17" font-weight="600">Learn More</text>
  <!-- Service cards -->
  <text x="100" y="700" fill="#1a1a2e" font-family="system-ui" font-size="32" font-weight="700">Services</text>
  <g>
    <rect x="100" y="730" width="320" height="220" rx="20" fill="#fff" stroke="#e2e8f0"/>
    <rect x="100" y="730" width="320" height="4" rx="2" fill="#0f4c81" opacity="0.6"/>
    <rect x="130" y="755" width="64" height="64" rx="14" fill="rgba(15,76,129,0.1)"/>
    <text x="130" y="850" fill="#1a1a2e" font-family="system-ui" font-size="18" font-weight="700">Evaluation</text>
    <text x="130" y="880" fill="#6b6b8d" font-family="system-ui" font-size="13">Annual evaluation</text>
    <text x="130" y="900" fill="#6b6b8d" font-family="system-ui" font-size="13">of departments &amp; centres</text>
    <rect x="440" y="730" width="320" height="220" rx="20" fill="#fff" stroke="#e2e8f0"/>
    <rect x="440" y="730" width="320" height="4" rx="2" fill="#0f4c81" opacity="0.6"/>
    <rect x="470" y="755" width="64" height="64" rx="14" fill="rgba(15,76,129,0.1)"/>
    <text x="470" y="850" fill="#1a1a2e" font-family="system-ui" font-size="18" font-weight="700">Accreditation</text>
    <text x="470" y="880" fill="#6b6b8d" font-family="system-ui" font-size="13">Support for national &amp;</text>
    <text x="470" y="900" fill="#6b6b8d" font-family="system-ui" font-size="13">international accreditation</text>
    <rect x="780" y="730" width="320" height="220" rx="20" fill="#fff" stroke="#e2e8f0"/>
    <rect x="780" y="730" width="320" height="4" rx="2" fill="#0f4c81" opacity="0.6"/>
    <rect x="810" y="755" width="64" height="64" rx="14" fill="rgba(15,76,129,0.1)"/>
    <text x="810" y="850" fill="#1a1a2e" font-family="system-ui" font-size="18" font-weight="700">Rankings</text>
    <text x="810" y="880" fill="#6b6b8d" font-family="system-ui" font-size="13">Tracking the university</text>
    <text x="810" y="900" fill="#6b6b8d" font-family="system-ui" font-size="13">in global rankings</text>
    <rect x="1120" y="730" width="280" height="220" rx="20" fill="#fff" stroke="#e2e8f0"/>
    <rect x="1120" y="730" width="280" height="4" rx="2" fill="#0f4c81" opacity="0.6"/>
    <rect x="1150" y="755" width="64" height="64" rx="14" fill="rgba(15,76,129,0.1)"/>
    <text x="1150" y="850" fill="#1a1a2e" font-family="system-ui" font-size="18" font-weight="700">Labs</text>
    <text x="1150" y="880" fill="#6b6b8d" font-family="system-ui" font-size="13">ISO/IEC 17025 lab</text>
    <text x="1150" y="900" fill="#6b6b8d" font-family="system-ui" font-size="13">accreditation</text>
  </g>
</svg>
