# Contact form subject taxonomy (theme defaults).
# Each entry has a `value` (form-submitted) and an `i18nKey` (display label).
# Sites override by placing their own data/contactForm.yaml at the site root.
subjects:
  - value: "general"
    i18nKey: "form_subject_general"
  - value: "academic"
    i18nKey: "form_subject_academic"
  - value: "admission"
    i18nKey: "form_subject_admission"
  - value: "technical"
    i18nKey: "form_subject_technical"
  - value: "other"
    i18nKey: "form_subject_other"
